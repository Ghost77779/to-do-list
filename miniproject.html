<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student To-Do List</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #020617;
      --primary: #38bdf8;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 16px;
      color: var(--primary);
      letter-spacing: 1px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
      background: #020617;
      color: var(--text);
      border: 1px solid #1e293b;
    }

    button {
      background: var(--primary);
      color: #020617;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #020617;
      border-radius: 8px;
      border: 1px solid #1e293b;
      transition: 0.2s;
    }

    li.completed span {
      text-decoration: line-through;
      color: var(--muted);
    }

    li span {
      cursor: pointer;
      flex: 1;
    }

    .delete-btn {
      background: transparent;
      color: var(--danger);
      border: none;
      font-size: 18px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 16px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>📌 To-Do List</h1>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Enter a new task..." />
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

  </div>

  <script>
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");

    function addTask() {
      const taskText = taskInput.value.trim();
      if (taskText === "") return;

      const li = document.createElement("li");

      const span = document.createElement("span");
      span.textContent = taskText;
      span.onclick = () => li.classList.toggle("completed");

      const deleteBtn = document.createElement("button");
      deleteBtn.innerHTML = "✖";
      deleteBtn.className = "delete-btn";
      deleteBtn.onclick = () => li.remove();

      li.appendChild(span);
      li.appendChild(deleteBtn);
      taskList.appendChild(li);

      taskInput.value = "";
    }

    taskInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        addTask();
      }
    });
  </script>

</body>
</html>
